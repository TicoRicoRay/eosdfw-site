<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.description }}">
  <link rel="canonical" href="{{ site.site_url }}/{{ page.out|replace('index.html','') }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="EOSDFW.com">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description }}">
  <meta property="og:url" content="{{ site.site_url }}/{{ page.out|replace('index.html','') }}">
  <meta property="og:image" content="{{ site.site_url }}/images/og-default.jpg">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:description" content="{{ page.description }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="{{ asset_prefix }}images/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ asset_prefix }}css/style.css">

  <!-- JSON-LD: Person + LocalBusiness -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": "Ray Myers — Professional EOS Implementer",
    "description": "Professional EOS Implementer serving the Dallas–Fort Worth metroplex. Helping entrepreneurs and leadership teams get what they want from their businesses.",
    "url": "{{ site.site_url }}",
    "email": "{{ site.primary_email }}",
    "areaServed": [
      { "@type": "City", "name": "Dallas" },
      { "@type": "City", "name": "Fort Worth" },
      { "@type": "City", "name": "Plano" },
      { "@type": "City", "name": "Frisco" },
      { "@type": "City", "name": "Irving" },
      { "@type": "City", "name": "Arlington" }
    ],
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Plano",
      "addressRegion": "TX",
      "addressCountry": "US"
    },
    "founder": {
      "@type": "Person",
      "name": "Ray Myers",
      "jobTitle": "Professional EOS Implementer",
      "sameAs": [
        "{{ site.linkedin }}",
        "https://implementer.eosworldwide.com/ray-myers/"
      ]
    }
  }
  </script>
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% include "partials/header.html" %}
  <main id="main">
    {% block content %}{% endblock %}
  </main>
  {% include "partials/footer.html" %}
  <script src="{{ asset_prefix }}js/main.js" defer></script>
</body>
</html>
